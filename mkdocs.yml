site_name: C++ Mastery Path
site_description: A structured, module-wise C++ training program from entry level to master level.
site_url: https://sigilipelli.github.io/cpp-mastery-path/
repo_url: https://github.com/SIGILIPELLI/cpp-mastery-path
repo_name: cpp-mastery-path

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Privacy Policy: privacy.md
  - "Level 1 · Entry":
      - Overview: level-1/index.md
      - "01 · Setup & First Program": level-1/01-setup.md
      - "02 · Variables, Types & Operators": level-1/02-variables-types-operators.md
      - "03 · Control Flow": level-1/03-control-flow.md
      - "04 · Functions & Overloading": level-1/04-functions-overloading.md
      - "05 · Arrays & std::vector Basics": level-1/05-arrays-vector-basics.md
      - "06 · Strings (std::string)": level-1/06-strings.md
      - "07 · Classes & Objects Basics": level-1/07-classes-objects.md
      - "08 · References & Pointers": level-1/08-references-pointers.md
      - "09 · Exception Handling Basics": level-1/09-exception-handling.md
      - "10 · Project — Bank Account CLI": level-1/10-project-bank-account-cli.md
  - "Level 2 · Intermediate":
